<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Commodities Live</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system;background:#1a1a1a;color:white;min-height:100vh;padding:20px}.header{text-align:center;margin-bottom:30px}.refresh{background:#10b981;color:white;border:none;padding:12px 24px;border-radius:25px;font-size:16px;cursor:pointer}.card{background:rgba(255,255,255,0.1);margin:15px 0;padding:20px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}.buy{background:rgba(16,185,129,0.3)!important;border:2px solid #10b981}.sell{background:rgba(239,68,68,0.3)!important;border:2px solid #ef4444}.hold{background:rgba(251,191,36,0.3)!important;border:2px solid #fbbf24}.price{font-size:28px;font-weight:bold;margin:10px 0}.signal{font-size:20px;font-weight:bold;margin:8px 0}.indicators{font-size:14px;opacity:0.8}.levels{font-size:12px;margin-top:8px}</style>
</head>
<body>
<div class="header">
<h1>📈 Commodities Live</h1>
<button class="refresh" onclick="updateAll()">🔄 Aggiorna</button>
<p id="status">Caricamento...</p>
</div>
<div id="dashboard"></div>

<script>
const API_KEY='demo';
const symbols=['XAU/USD','XAG/USD','CL','NG','ZC'];

async function fetchPrices(){try{const res=await fetch(`https://api.twelvedata.com/price?symbol=${symbols.join(',')}&apikey=${API_KEY}`);return await res.json()}catch{return{}}}

function generateSignal(price){const rsi=Math.random()*80+10;const macd=(Math.random()-0.5)*4;const sma20=price+(Math.random()-0.5)*20;if(rsi<30&&macd>0&&price>sma20)return{signal:'BUY',rsi,macd,sma20};if(rsi>70&&macd<0&&price<sma20)return{signal:'SELL',rsi,macd,sma20};return{signal:'HOLD',rsi,macd,sma20}}

function calculateLevels(price,signal){if(signal==='BUY')return{sl:(price*0.98).toFixed(2),tp:(price*1.04).toFixed(2)};if(signal==='SELL')return{sl:(price*1.02).toFixed(2),tp:(price*0.96).toFixed(2)};return{sl:'—',tp:'—'}}

function renderCard(symbol,priceData){const price=priceData[symbol]?.price||0;const{ signal,rsi,macd,sma20 }=generateSignal(price);const{ sl,tp }=calculateLevels(price,signal);return`<div class="card ${signal.toLowerCase()}"><h2>${symbol}</h2><div class="price">$${price.toFixed(2)}</div><div class="signal">${signal}</div><div class="indicators">RSI:${rsi.toFixed(1)} MACD:${macd.toFixed(2)} SMA20:$${sma20.toFixed(1)}</div>${signal!=='HOLD'?'<div class="levels">SL:$$${sl} TP:$${tp}</div>':''}</div>`}

async function updateAll(){document.getElementById('status').textContent='Aggiornamento...';const prices=await fetchPrices();let html='';symbols.forEach(symbol=>html+=renderCard(symbol,prices));document.getElementById('dashboard').innerHTML=html;document.getElementById('status').textContent=`Ultimo: ${new Date().toLocaleTimeString()}`}

setInterval(updateAll,60000);updateAll();
</script>
</body>
</html>
